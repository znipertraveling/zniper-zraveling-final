<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Blog · Zniper Zraveling</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:#050505;color:#e0e0e0;padding:2rem 1.5rem;}.header{max-width:800px;margin:0 auto 2rem auto;text-align:center;}.header h1{font-size:2.5rem;font-weight:300;color:white;}.volver{display:inline-block;margin-top:1rem;color:#888;text-decoration:none;}.articulos{max-width:800px;margin:0 auto;}.articulo{background:#0a0a0a;border:1px solid #1a1a1a;padding:1.5rem;margin-bottom:1.5rem;}.articulo h2 a{color:white;text-decoration:none;font-weight:300;}.fecha{font-size:0.7rem;color:#666;margin:0.5rem 0;}.articulo img{max-width:100%;margin:0.5rem 0;}.resumen{color:#aaa;line-height:1.5;}.footer{text-align:center;margin-top:3rem;color:#444;font-size:0.7rem;}</style></head>
<body><div class="header"><h1>📰 Blog</h1><p>Pensamientos, reflexiones y detrás de cámaras</p><a href="/" class="volver">← Volver a la galería</a></div><div class="articulos" id="articulos"></div><div class="footer">Zniper Zraveling · autor · 2026</div>
<script>async function cargar(){const r=await fetch('/api/datos');const data=await r.json();const arts=data.blog||[];const cont=document.getElementById('articulos');if(!arts.length){cont.innerHTML='<p style="text-align:center;">Próximamente más artículos.</p>';return;}let html='';for(let a of arts.slice().reverse()){html+=`<div class="articulo"><h2><a href="/blog/${a.id}">${a.titulo}</a></h2><div class="fecha">${a.fecha}</div>${a.imagen?`<img src="${a.imagen}">`:''}<div class="resumen">${a.texto.substring(0,200)}${a.texto.length>200?'...':''}</div></div>`;}cont.innerHTML=html;}cargar();</script></body></html>
