<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Blog · Zniper</title><style>body{font-family:'Inter',sans-serif;background:#050505;color:#e0e0e0;padding:2rem;max-width:800px;margin:0 auto;}</style></head>
<body><h1>Blog</h1><div id="blog-list"></div><script>fetch('/api/datos').then(r=>r.json()).then(d=>{const arts=d.blog||[];const cont=document.getElementById('blog-list');if(!arts.length){cont.innerHTML='<p>Próximamente artículos.</p>';return;}cont.innerHTML=arts.slice().reverse().map(a=>`<div style="background:#0a0a0a;padding:1rem;margin-bottom:1rem;"><h2><a href="/blog/${a.id}">${a.titulo}</a></h2><p>${a.fecha}</p>${a.imagen?`<img src="${a.imagen}" style="max-width:100%;">`:''}<p>${a.texto.substring(0,200)}...</p></div>`).join('');});</script></body></html>
