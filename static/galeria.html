<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zniper Zraveling · Galería</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #050505; color: #e0e0e0; padding: 1rem 1.5rem; }
        .navbar { max-width: 1200px; margin: 0 auto 1rem auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid #222; padding-bottom: 1rem; }
        .logo a { color: white; text-decoration: none; font-size: 1.2rem; font-weight: 300; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; }
        .nav-links a { color: #aaa; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; transition: 0.2s; }
        .nav-links a:hover { color: white; }
        .admin-link { border: 1px solid #333; padding: 0.2rem 0.5rem; border-radius: 4px; }
        .instagram-link { color: #e4405f !important; }
        .header { max-width: 1100px; margin: 0 auto 2rem auto; text-align: center; }
        .header h1 { font-size: 2.5rem; font-weight: 300; color: #fff; margin-bottom: 0.5rem; }
        .header p { font-size: 0.8rem; color: #777; text-transform: uppercase; }
        .firma { margin-top: 0.5rem; font-size: 0.7rem; color: #444; font-style: italic; }
        .filtros { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.3rem; max-width: 800px; margin: 0 auto 2rem auto; }
        .filtro-btn { background: transparent; border: none; padding: 0.3rem 0.8rem; font-size: 0.7rem; color: #6a6a6a; cursor: pointer; text-transform: uppercase; }
        .filtro-btn:hover { color: white; background: #151515; }
        .filtro-btn.activo { color: white; background: #1a1a1a; }
        .galeria { max-width: 1200px; margin: 0 auto; column-count: 3; column-gap: 1.2rem; }
        .foto-item { break-inside: avoid; margin-bottom: 1.2rem; cursor: pointer; transition: opacity 0.2s; }
        .foto-item:hover { opacity: 0.92; }
        .foto-img { width: 100%; height: auto; display: block; }
        .foto-info { padding: 0.5rem 0.2rem 0.8rem 0.2rem; }
        .foto-titulo { font-size: 0.75rem; color: #bbb; }
        .foto-proyecto { font-size: 0.6rem; color: #555; text-transform: uppercase; margin-top: 0.2rem; }
        .footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #151515; color: #3a3a3a; font-size: 0.6rem; text-transform: uppercase; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,5,0.98); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-img { max-width: 85%; max-height: 80%; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(20,20,20,0.6); color: #aaa; border: none; font-size: 2rem; padding: 0.5rem 1rem; cursor: pointer; }
        .nav-btn:hover { color: white; }
        .prev { left: 15px; }
        .next { right: 15px; }
        .modal-cerrar { position: absolute; top: 20px; right: 30px; font-size: 1.8rem; color: #777; cursor: pointer; }
        .modal-cerrar:hover { color: white; }
        @media (max-width: 800px) { .galeria { column-count: 2; } body { padding: 1rem; } .header h1 { font-size: 1.8rem; } }
        @media (max-width: 500px) { .galeria { column-count: 1; } .nav-links { gap: 0.8rem; } }
    </style>
</head>
<body>
<div class="navbar">
    <div class="logo"><a href="/">ZNIPER ZRAVELING</a></div>
    <div class="nav-links" id="nav-links">
        <a href="/">INICIO</a>
        <a href="/blog">BLOG</a>
        <div id="paginas-dinamicas"></div>
        <a href="/admin" class="admin-link">ADMIN</a>
        <a href="#" id="instagramLink" class="instagram-link" target="_blank">📷 INSTAGRAM</a>
    </div>
</div>
<div class="header"><h1 id="titulo">Zniper Zraveling</h1><p id="subtitulo">cargando...</p><div class="firma" id="firma"></div></div>
<div class="filtros" id="filtros"></div>
<div class="galeria" id="galeria"></div>
<div class="footer"><span id="footerText"></span></div>
<div id="modal" class="modal"><span class="modal-cerrar">✕</span><button class="nav-btn prev" id="prevBtn">‹</button><img class="modal-img" id="modal-img"><button class="nav-btn next" id="nextBtn">›</button></div>
<script>
let fotos = [], categorias = [], proyectoActivo = "todos", fotosActuales = [], indiceModalActual = 0;
async function cargarTodo(){
    const r=await fetch('/api/datos'); const data=await r.json();
    document.getElementById('titulo').textContent=data.titulo; document.getElementById('subtitulo').textContent=data.subtitulo; document.getElementById('firma').textContent=data.firma; document.getElementById('footerText').textContent=data.titulo+' · autor · 2026';
    fotos=data.fotos||[]; categorias=data.categorias||[];
    const instagramUrl=data.instagram||'https://instagram.com/znipertraveling'; document.getElementById('instagramLink').href=instagramUrl;
    const paginas=data.paginas||[]; const cont=document.getElementById('paginas-dinamicas'); cont.innerHTML=paginas.filter(p=>p.visible).map(p=>`<a href="/pagina/${p.slug}">${p.titulo.toUpperCase()}</a>`).join('');
    renderFiltros(); renderGaleria();
}
function renderFiltros(){ const cont=document.getElementById('filtros'); let html=`<button class="filtro-btn activo" data-proyecto="todos">TODAS</button>`; categorias.forEach(c=>{html+=`<button class="filtro-btn" data-proyecto="${c}">${c.toUpperCase()}</button>`;}); cont.innerHTML=html; document.querySelectorAll('.filtro-btn').forEach(btn=>{btn.onclick=()=>{document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('activo')); btn.classList.add('activo'); proyectoActivo=btn.dataset.proyecto; renderGaleria();};});}
function renderGaleria(){ fotosActuales=proyectoActivo==='todos'?[...fotos]:fotos.filter(f=>f.categoria===proyectoActivo); const gal=document.getElementById('galeria'); if(!fotosActuales.length){gal.innerHTML='<p style="text-align:center; color:#555;">sin imágenes en esta serie</p>'; return;} let html=''; for(let i=0;i<fotosActuales.length;i++){const f=fotosActuales[i]; html+=`<div class="foto-item" data-index="${i}"><img class="foto-img" src="${f.archivo}" alt="${f.titulo}" loading="lazy"><div class="foto-info"><div class="foto-titulo">${f.titulo}</div><div class="foto-proyecto">${f.categoria}</div></div></div>`;} gal.innerHTML=html; document.querySelectorAll('.foto-item').forEach(item=>{item.onclick=()=>{const idx=parseInt(item.dataset.index); abrirModal(idx);};});}
function abrirModal(idx){if(!fotosActuales.length) return; indiceModalActual=idx; document.getElementById('modal-img').src=fotosActuales[idx].archivo; document.getElementById('modal').style.display='flex';}
function configurarModal(){ const modal=document.getElementById('modal'),modalImg=document.getElementById('modal-img'),cerrar=document.querySelector('.modal-cerrar'),prev=document.getElementById('prevBtn'),next=document.getElementById('nextBtn'); prev.onclick=()=>{let n=indiceModalActual-1; if(n<0)n=fotosActuales.length-1; indiceModalActual=n; modalImg.src=fotosActuales[n].archivo;}; next.onclick=()=>{let n=indiceModalActual+1; if(n>=fotosActuales.length)n=0; indiceModalActual=n; modalImg.src=fotosActuales[n].archivo;}; cerrar.onclick=()=>modal.style.display='none'; modal.onclick=(e)=>{if(e.target===modal) modal.style.display='none';};}
cargarTodo(); configurarModal();
</script>
</body>
</html>
