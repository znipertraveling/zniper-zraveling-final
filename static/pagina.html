<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Zniper Zraveling · Página</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:#050505;color:#e0e0e0;padding:2rem 1.5rem;}.contenedor{max-width:800px;margin:0 auto;}.volver{color:#888;text-decoration:none;font-size:0.8rem;}h1{margin:1rem 0;font-weight:300;}.contenido{line-height:1.6;color:#ccc;}.footer{margin-top:3rem;text-align:center;color:#444;font-size:0.7rem;}</style></head>
<body><div class="contenedor"><a href="/" class="volver">← Volver a la galería</a><h1 id="titulo"></h1><div class="contenido" id="contenido"></div><div class="footer">Zniper Zraveling · autor · 2026</div></div>
<script>const slug=window.location.pathname.split('/')[2];async function cargar(){const r=await fetch('/api/datos');const data=await r.json();const pagina=(data.paginas||[]).find(p=>p.slug===slug && p.visible===true);if(!pagina){document.getElementById('titulo').textContent='No encontrada';return;}document.getElementById('titulo').textContent=pagina.titulo;document.getElementById('contenido').innerHTML=pagina.contenido.replace(/\n/g,'<br>');}cargar();</script></body></html>
