<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Página</title><style>body{font-family:'Inter',sans-serif;background:#050505;color:#e0e0e0;padding:2rem 1.5rem;max-width:800px;margin:0 auto;}</style></head>
<body><div id="contenido"></div><script>const slug=location.pathname.split('/')[2];fetch('/api/datos').then(r=>r.json()).then(d=>{const p=d.paginas.find(p=>p.slug===slug);if(!p){document.getElementById('contenido').innerHTML='<p>No encontrada</p>';return;}document.getElementById('contenido').innerHTML=`<h1>${p.titulo}</h1><div>${p.contenido}</div>`;});</script></body></html>
