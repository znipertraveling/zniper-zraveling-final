<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login</title><style>body{font-family:'Inter',sans-serif;background:#050505;color:#e0e0e0;display:flex;justify-content:center;align-items:center;height:100vh;}.login{background:#0a0a0a;padding:2rem;border:1px solid #222;width:300px;}input,button{width:100%;margin:0.5rem 0;padding:0.5rem;background:#111;border:1px solid #333;color:white;}button{background:#222;cursor:pointer;}</style></head>
<body><div class="login"><h2>Admin Login</h2><input type="text" id="nickname" placeholder="nickname"><input type="password" id="password" placeholder="contraseña"><button id="loginBtn">Ingresar</button></div><script>document.getElementById('loginBtn').onclick=async()=>{const n=document.getElementById('nickname').value;const p=document.getElementById('password').value;const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname:n,password:p})});const d=await r.json();if(d.success){sessionStorage.setItem('zniper_auth','true');window.location.href='/admin';}else alert('Error');};</script></body></html>
