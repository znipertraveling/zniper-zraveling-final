<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zniper Admin · Acceso</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login { background: #0a0a0a; padding: 2rem; border: 1px solid #222; width: 320px; text-align: center; }
        h1 { font-weight: 300; margin-bottom: 1rem; }
        input, button { width: 100%; padding: 0.5rem; margin: 0.5rem 0; background: #111; border: 1px solid #333; color: white; }
        button { background: #222; cursor: pointer; }
        button:hover { background: #333; }
    </style>
</head>
<body>
<div class="login">
    <h1>Zniper Admin</h1>
    <input type="text" id="nickname" placeholder="nickname">
    <input type="password" id="password" placeholder="contraseña">
    <button id="loginBtn">Ingresar</button>
</div>
<script>
    document.getElementById('loginBtn').onclick = async () => {
        const nickname = document.getElementById('nickname').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nickname, password })
        });
        const data = await res.json();
        if (data.success) {
            sessionStorage.setItem('zniper_auth', 'true');
            window.location.href = '/admin';
        } else {
            alert('Credenciales incorrectas');
        }
    };
</script>
</body>
</html>
