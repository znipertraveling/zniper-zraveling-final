<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Artículo</title><style>body{font-family:'Inter',sans-serif;background:#050505;color:#e0e0e0;padding:2rem 1.5rem;max-width:800px;margin:0 auto;}</style></head>
<body><div id="contenido"></div><script>const id=location.pathname.split('/')[2];fetch('/api/datos').then(r=>r.json()).then(d=>{const a=d.blog.find(a=>a.id==id);if(!a){document.getElementById('contenido').innerHTML='<p>No encontrado</p>';return;}let html=`<h1>${a.titulo}</h1><p>${a.fecha}</p>${a.imagen?`<img src="${a.imagen}" style="max-width:100%;">`:''}<div>${a.texto}</div>`;document.getElementById('contenido').innerHTML=html;});</script></body></html>
