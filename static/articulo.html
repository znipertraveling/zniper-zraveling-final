<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #e0e0e0; padding: 2rem; max-width: 720px; margin: 0 auto; line-height: 1.6; }
        h1 { font-family: 'EB Garamond', Georgia, serif; font-weight: 400; font-size: 2rem; margin-bottom: 0.5rem; }
        .fecha { color: #666; font-size: 0.8rem; margin-bottom: 2rem; }
        .bloque-texto { font-family: 'EB Garamond', Georgia, serif; font-size: 1.15rem; color: #ccc; margin: 1.2rem 0; white-space: pre-wrap; }
        .bloque-img { margin: 1.5rem 0; }
        .bloque-img img { width: 100%; display: block; filter: grayscale(100%); border: 1px solid #222; }
        .bloque-img figcaption { font-size: 0.85rem; color: #777; margin-top: 0.5rem; font-style: italic; }
        .comentario { background: #0a0a0a; padding: 1rem; margin-bottom: 0.8rem; border: 1px solid #222; border-radius: 4px; font-size: 0.9rem; }
        .com-form input, .com-form textarea { width: 100%; max-width: 100%; box-sizing: border-box; padding: 0.6rem; margin: 0.4rem 0; background: #111; border: 1px solid #333; color: #eee; border-radius: 4px; font-family: inherit; }
        .com-form button { background: #eaeaea; color: #111; border: none; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.4rem; }
        a.back { color: #888; text-decoration: none; font-size: 0.8rem; }
        a.back:hover { color: #fff; }
    </style>
</head>
<body>
<p><a class="back" href="/#blog">← Volver al blog</a></p>
<div id="contenido"></div>
<h2 style="font-size:0.85rem; letter-spacing:0.12em; color:#888; margin-top:2.5rem; text-transform:uppercase; font-weight:400;">Comentarios</h2>
<div id="comentarios"></div>
<div class="com-form" style="margin-top:1.5rem;">
    <p style="color:#888; font-size:0.85rem;">Deja un comentario (elige un nombre o apodo; no hace falta registrarse).</p>
    <input type="text" id="nickname" placeholder="Tu nombre o apodo" autocomplete="nickname" maxlength="80">
    <textarea id="texto" rows="4" placeholder="Tu comentario" maxlength="4000"></textarea>
    <button type="button" id="enviar">Publicar comentario</button>
</div>
<script>
function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
const id = parseInt(location.pathname.split('/').pop(), 10);
let datos = {};
fetch('/api/datos').then(r => r.json()).then(d => {
    datos = d;
    const art = (d.blog || []).find(a => a.id === id);
    const el = document.getElementById('contenido');
    if (!art) {
        el.innerHTML = '<p>Artículo no encontrado.</p>';
        return;
    }
    document.title = art.titulo + ' · blog';
    let html = '<h1>' + escHtml(art.titulo) + '</h1><p class="fecha">' + escHtml(art.fecha || '') + '</p>';
    const bloques = art.bloques || [];
    bloques.forEach(b => {
        if (b.tipo === 'titulo' && (b.texto || '').trim()) html += '<h2 style="font-family:\'EB Garamond\',Georgia,serif;font-weight:400;font-size:1.75rem;margin:1.5rem 0 0.75rem;">' + escHtml(b.texto) + '</h2>';
        if (b.tipo === 'texto' && (b.texto || '').trim()) html += '<div class="bloque-texto">' + escHtml(b.texto) + '</div>';
        if (b.tipo === 'imagen' && b.archivo) {
            const pie = (b.pie || '').trim();
            html += '<figure class="bloque-img"><img src="' + b.archivo + '" alt="">';
            if (pie) html += '<figcaption>' + escHtml(pie) + '</figcaption>';
            html += '</figure>';
        }
    });
    el.innerHTML = html;
    const coms = (d.comentarios || []).filter(c => c.tipo === 'blog' && String(c.entidad_id) === String(id) && c.aprobado === true);
    document.getElementById('comentarios').innerHTML = coms.length
        ? coms.map(c => '<div class="comentario"><strong>' + escHtml(c.nickname) + '</strong>' + (c.calificacion ? ' (' + '⭐'.repeat(c.calificacion) + ')' : '') + '<br>' + escHtml(c.texto) + '<br><small style="color:#666;">' + escHtml(c.fecha || '') + '</small></div>').join('')
        : '<p style="color:#666; font-size:0.9rem;">Sin comentarios aún. ¡Sé el primero!</p>';
});
document.getElementById('enviar').onclick = async () => {
    const nickname = document.getElementById('nickname').value.trim();
    const texto = document.getElementById('texto').value.trim();
    if (!nickname || !texto) { alert('Nombre y comentario son obligatorios'); return; }
    await fetch('/api/comentarios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tipo: 'blog', entidad_id: id, nickname, calificacion: 0, texto })
    });
    alert('Comentario enviado' + (datos.moderacion_comentarios ? ' (pendiente de moderación)' : ''));
    location.reload();
};
</script>
</body>
</html>
