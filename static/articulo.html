<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Artículo</title><style>body{font-family:'Inter',sans-serif;background:#050505;color:#e0e0e0;padding:2rem;max-width:800px;margin:0 auto;}.comentario{background:#0a0a0a;padding:1rem;margin-bottom:1rem;border-left:3px solid #4caf50;}</style></head>
<body><div id="contenido"></div><div id="comentarios"></div><h3>Deja tu comentario</h3><input type="text" id="nickname" placeholder="Tu nombre"><select id="calificacion"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select><textarea id="texto" rows="3" placeholder="Comentario"></textarea><button id="enviar">Enviar</button>
<script>const id=location.pathname.split('/')[2];let datos;fetch('/api/datos').then(r=>r.json()).then(d=>{datos=d;const art=datos.blog.find(a=>a.id==id);if(art){document.getElementById('contenido').innerHTML=`<h1>${art.titulo}</h1><p>${art.fecha}</p>${art.imagen?`<img src="${art.imagen}" style="max-width:100%;">`:''}<div>${art.texto}</div>`;}const comentarios=datos.comentarios.filter(c=>c.tipo==='blog' && c.entidad_id==id && c.aprobado===true);document.getElementById('comentarios').innerHTML=comentarios.map(c=>`<div class="comentario"><strong>${c.nickname}</strong> (${'⭐'.repeat(c.calificacion)})<br>${c.texto}<br><small>${c.fecha}</small></div>`).join('');});document.getElementById('enviar').onclick=async()=>{const nickname=document.getElementById('nickname').value;const calificacion=parseInt(document.getElementById('calificacion').value);const texto=document.getElementById('texto').value;if(!nickname||!texto){alert('Completa nombre y comentario');return;}await fetch('/api/comentarios',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tipo:'blog',entidad_id:id,nickname,calificacion,texto})});alert('Comentario enviado');location.reload();};</script></body></html>
