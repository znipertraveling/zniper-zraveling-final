<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Serie</title><style>body{font-family:'Inter',sans-serif;background:#050505;color:#e0e0e0;padding:2rem;max-width:1000px;margin:0 auto;}.galeria{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;}.foto-serie{width:100%;aspect-ratio:4/3;object-fit:cover;}</style></head>
<body><div id="contenido"></div><div class="galeria" id="galeria"></div><div id="comentarios"></div><h3>Comentarios</h3><input type="text" id="nickname" placeholder="Nombre"><select id="calificacion"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select><textarea id="texto" rows="3" placeholder="Comentario"></textarea><button id="enviar">Enviar</button>
<script>const id=location.pathname.split('/')[2];let datos;fetch('/api/datos').then(r=>r.json()).then(d=>{datos=d;const serie=datos.series.find(s=>s.id==id);if(serie){document.getElementById('contenido').innerHTML=`<h1>${serie.titulo}</h1><p>${serie.descripcion}</p>`;let fotosHtml='';serie.fotos.forEach(f=>{fotosHtml+=`<img class="foto-serie" src="${f.archivo}" alt="${f.titulo}">`;});document.getElementById('galeria').innerHTML=fotosHtml;}const comentarios=datos.comentarios.filter(c=>c.tipo==='serie' && c.entidad_id==id && c.aprobado===true);document.getElementById('comentarios').innerHTML=comentarios.map(c=>`<div><strong>${c.nickname}</strong> (${'⭐'.repeat(c.calificacion)})<br>${c.texto}<br><small>${c.fecha}</small></div>`).join('');});document.getElementById('enviar').onclick=async()=>{const nickname=document.getElementById('nickname').value;const calificacion=parseInt(document.getElementById('calificacion').value);const texto=document.getElementById('texto').value;if(!nickname||!texto){alert('Completa nombre y comentario');return;}await fetch('/api/comentarios',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tipo:'serie',entidad_id:id,nickname,calificacion,texto})});alert('Comentario enviado');location.reload();};</script></body></html>
